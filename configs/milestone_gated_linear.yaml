# Phase 6 §0 pre-sweep gate: SAME easy slice + SAME budget as the
# transformer milestone; only the architecture differs. Fairness is
# non-negotiable (same steps/optimizer/schedule/data seed).
arch: gated_linear
vocab_size: 99
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
data:
  mode: assoc_recall
  n_bindings:
  - 2
  - 4
  - 6
  - 8
  distractor_density: 0.1
  seq_len: 96
  query_type: get
  query_pos: early
train:
  steps: 4000
  batch_size: 64
  lr: 0.0006
  weight_decay: 0.01
  warmup: 200
  eval_every: 250
  eval_n: 256
  target_acc: 0.98
  seed: 0
  run_name: gated_linear_milestone
chunk_size: 64
