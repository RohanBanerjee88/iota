# Phase 6 §0 gate: identical easy slice + identical training budget
# across all three architectures; only `arch` (and arch-only knobs) differ.
arch: hybrid
vocab_size: 99
d_model: 256
n_layers: 5
n_heads: 4
d_ff: 512
dropout: 0.0
data:
  mode: assoc_recall
  n_bindings:
  - 2
  - 4
  - 6
  - 8
  distractor_density: 0.1
  seq_len: 96
  query_type: get
  query_pos: early
train:
  steps: 6000
  batch_size: 64
  lr: 0.002
  weight_decay: 0.01
  warmup: 200
  eval_every: 750
  eval_n: 200
  target_acc: 0.97
  final_eval_n: 1000
  seed: 0
  run_name: hybrid_milestone
chunk_size: 64
full_attention_layers:
- 2
- 4
decay_bias_init: 6.0
short_conv: 0
