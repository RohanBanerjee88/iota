# Phase 6 sweep training -- GATED LINEAR (the slow learner). lr 3e-3 (it never
# groks at 1.5e-3); LONG easy phase (3000) so it groks before the ramp; generous
# max_steps. Early-stop only fires after the ramp (diff=1.0), so the slow pre-grok
# plateau no longer kills the run. transformer/hybrid keep lr 1.5e-3.
arch: gated_linear
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
chunk_size: 64
decay_bias_init: 6.0
short_conv: 0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 14000
  easy_steps: 3000
  ramp_steps: 4000
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.003
  run_name: gated_linear_sweep
