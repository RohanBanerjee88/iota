# Phase 6 sweep training (CPU-validated recipe): mixed curriculum
# (interleaved multi-query assoc_recall + additive state_track control),
# lr 1.5e-3, FLAT easy phase (easy_steps) then difficulty RAMP, plateau on
# per-query. n_bindings<=16, seq_len<=512. Identical budget across archs.
arch: hybrid
d_model: 256
n_layers: 5
n_heads: 4
d_ff: 512
dropout: 0.0
chunk_size: 64
decay_bias_init: 6.0
short_conv: 0
full_attention_layers:
- 2
- 4
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 64
    max: 512
  n_queries:
    min: 1
    max: 8
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.7
- mode: state_track
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 64
    max: 512
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.3
train:
  max_steps: 8000
  batch_size: 64
  lr: 0.0015
  warmup: 200
  weight_decay: 0.01
  easy_steps: 1000
  ramp_steps: 3500
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  run_name: hybrid_sweep
