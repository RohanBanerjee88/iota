# Phase 6 sweep training. Moderate ceiling (n_bindings<=8, n_queries<=3, seq<=256);
# interleaved multi-query + additive state_track control; flat easy phase -> ramp;
# plateau on per-query. lr 1.5e-3 (GPU-confirmed for transformer: per_q climbs to
# 0.75 by step 3000 and rising; 3e-3/5e-3 destabilize). GLA: probe first.
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 8000
  easy_steps: 2000
  ramp_steps: 3000
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.0015
  run_name: transformer_sweep
