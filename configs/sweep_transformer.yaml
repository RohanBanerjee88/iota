# Phase 6 sweep training -- TRANSFORMER baseline. Stabilized after a run crashed
# at the difficulty ramp (GPU-nondeterminism spike): lower lr 1.2e-3 + gentler
# ramp (5000) + recovery room. Reached 0.848 at lr 1.5e-3 but that was unstable.
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 11000
  easy_steps: 2000
  ramp_steps: 5000
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.0012
  run_name: transformer_sweep
