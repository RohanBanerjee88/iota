# Phase 6 sweep training (CPU-validated): interleaved multi-query + additive
# state_track control; flat easy phase then difficulty ramp; plateau on per-query.
# SAME schedule shape; per-arch LR (GLA groks slower -> higher LR, same protocol).
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 64
    max: 512
  n_queries:
    min: 1
    max: 8
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.7
- mode: state_track
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 64
    max: 512
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.3
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 10000
  easy_steps: 2000
  ramp_steps: 4000
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.0015
  run_name: transformer_sweep
