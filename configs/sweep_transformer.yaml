# Phase 6 sweep -- TRANSFORMER baseline. lr 1.5e-3 (needed for ~0.83 plateau;
# 1.2e-3 stalls at 0.59), gentle ramp (5000) + tight grad_clip 0.5 to kill the
# loss-spike crash at the ramp without lowering lr. GLA/hybrid unchanged (grad_clip
# defaults to 1.0, they train fine).
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 11000
  easy_steps: 2000
  ramp_steps: 5000
  eval_every: 500
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.0015
  run_name: transformer_sweep
  grad_clip: 0.5
