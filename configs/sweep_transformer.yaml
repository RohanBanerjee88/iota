# Phase 6 sweep training: mixed curriculum (assoc_recall multi-query +
# state_track control), n_bindings<=16, seq_len<=512, train to PLATEAU
# (patience early-stop on n=500 held-out), identical budget across archs.
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 128
    max: 512
  n_queries:
    min: 1
    max: 8
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.7
- mode: state_track
  n_bindings:
    min: 2
    max: 16
  seq_len:
    min: 128
    max: 512
  distractor_density: 0.1
  weight: 0.3
train:
  max_steps: 10000
  batch_size: 64
  lr: 0.003
  warmup: 200
  weight_decay: 0.01
  eval_every: 500
  eval_n: 500
  patience: 5
  seed: 0
  run_name: transformer_sweep
