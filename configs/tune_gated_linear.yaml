# FAST GLA probe: lr 3e-3, long easy phase (2500) so we can SEE it grok (~step
# 1500-2500) then climb on the ramp. ~12-15 min on T4. patience high so it won't
# early-stop during the flat pre-grok phase.
arch: gated_linear
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 5000
  easy_steps: 2500
  ramp_steps: 2000
  eval_every: 250
  eval_n: 500
  patience: 50
  seed: 0
  lr: 0.003
  run_name: tune_gla
chunk_size: 64
decay_bias_init: 6.0
short_conv: 0
