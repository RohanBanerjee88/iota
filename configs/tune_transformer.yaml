# FAST GPU tuning probe: transformer only, 3000 steps, eval every 250. Watch per_q.
# Vary train.lr (try 1.5e-3 / 3e-3 / 5e-3) to find what bootstraps the 256-dim model.
arch: transformer
d_model: 256
n_layers: 4
n_heads: 4
d_ff: 512
dropout: 0.0
curriculum:
- mode: assoc_recall
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  n_queries:
    min: 1
    max: 3
  distractor_density: 0.1
  query_pos: uniform
  weight: 0.75
- mode: state_track
  n_bindings:
    min: 2
    max: 8
  seq_len:
    min: 64
    max: 256
  distractor_density: 0.1
  ops_kinds:
  - add
  - sub
  weight: 0.25
train:
  batch_size: 64
  warmup: 200
  weight_decay: 0.01
  max_steps: 3000
  easy_steps: 1000
  ramp_steps: 1500
  eval_every: 250
  eval_n: 500
  patience: 8
  seed: 0
  lr: 0.003
  run_name: tune_transformer
